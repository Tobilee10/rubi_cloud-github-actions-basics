name : Hello world

on:
  pull_request:
    branches:
     - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2
      - name: hello world
        run: echo "Hello World, my first workflow from rubi_cloud-github-actions-basics repository!"
        shell: bash
  goodbye:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2
      - name: goodbye world
        run: echo "Goodbye World, my first workflow from rubi_cloud-github-actions-basics repository!"
        shell: bash