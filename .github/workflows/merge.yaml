name: Merge Example

on:
  push:
    branches:
      - main
    path:
      - 'typescript-project/**'
  workflow_dispatch:

jobs:
  merge-job:
    runs-on : ubuntu-latest
    
    defaults:
      run:
        working-directory: ./typescript-project
    strategy:
      fail-fast: true
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Nodejs
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: 'yarn'
          cache-dependency-path: ./typescript-project/yarn.lock

      # Install Yarn
      # - name: Install Yarn
      #   run: npm install --global yarn

      #Install dependencies
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      # Run linting
      - name: Run linting
        run: yarn lint
      
      # compile the code
      - name: Build project
        run: yarn build

      # Run tests
      - name: Run tests
        run: yarn test
      
      - run: git config user.email "oluwatobilobaadeje59@gmail.com"
      - run: git config user.name "@Tobilee10"
      - run: yarn version --patch --message "Bump version to %s" # Adds version number dynamically to the commit message

      - run: git push
      - run: git push --follow-tags
